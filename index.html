<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator JS</title>

    <script src="calculator.js" defer></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Orbitron:wght@600&family=Righteous&display=swap" rel="stylesheet">

    <style>

      h3 {
        font-family: 'Righteous', sans-serif !important;
      }

      button sup {
        background: transparent !important;
        background-color: transparent !important;
      }

      .btn{
        padding: 0px 20px !important;
      }

      @media (max-width: 768px) {
        
        .table {
          width: 95% !important; 
          max-width: 350px !important;
          margin: 30px auto !important; 
          padding: 20px 10px 15px 10px !important; 
          overflow: hidden !important;
        }

        .result {
          width: 100% !important;
          margin-left: 0 !important;
          height: 50px !important;
          padding: 5px;
        }

        .row1 {
          display: flex !important;
          justify-content: center !important;
          gap: 4px !important;
        }

        .row1 button {
          padding: 10px 0 !important;
          flex: 1 !important; 
          margin-left: 0 !important;
        }

      }
    </style>
  </head>
  <body>
    <div
      class="table"
      style="
        text-align: center;

        background-color: rgba(13, 115, 240, 0.314);
        padding: 20px 20px 15px 20px;
        width: 350px;
        border-radius: 20px;
        margin: 100px auto;
        box-shadow: 0px 0px 10px rgba(88, 200, 228, 0.46);
      "
    >
    <h3 class="mb-3" ><u>Calculator</u></h3>
      <div
        class="result"
        style="
          background-color: azure;
          width: 100%;
          height: 55px;
          text-align: center;
          justify-content: center;
          
        "
      >
        <h1 id="display">0</h1>
      </div>
      <br />
      <div class="row1 mb-2">
        <button
          class="btn btn-secondary"
          style="width: 100px; height: 40px;"
          onclick="clearDisplay()"
        >
          CE
        </button>
        <button
          class="btn btn-secondary d-inline-block align-items-center"
          style="width: 100px; height: 40px;"
          onclick="clearDisplay()"
        >
          C
        </button>
        <button
          class="btn btn-danger"
          style="width: 100px; height: 40px;"
          onclick="backspace()"
        >
          <i class="bi bi-backspace bg-transparent text-white"></i>
        </button>
      </div>
      <div class="row1 mb-2">
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('1/')"
        >
          1/x
        </button>
        <button
          class="btn btn-primary "
          style="height: 40px; width: 74px;"
          onclick="square()"
        >
          x &sup2;
        </button>
        <button
          class="btn btn-primary d-inline-block align-items-center"
          style="height: 40px; width: 74px;"
          onclick="squareRoot()"
        >
          &radic;x
        </button>
        <button
          class="btn btn-warning"
          style="height: 40px; width: 74px;"
          onclick="appendValue('/')"
        >
          &divide;
        </button>
      </div>
      <div class="row1 mb-2">
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('7')"
        >
          7
        </button>
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('8')"
        >
          8
        </button>
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('9')"
        >
          9
        </button>
        <button
          class="btn btn-warning"
          style="height: 40px; width: 74px;"
          onclick="appendValue('*')"
        >
          x
        </button>
      </div>
      <div class="row1 mb-2">
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('4')"
        >
          4
        </button>
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('5')"
        >
          5
        </button>
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('6')"
        >
          6
        </button>
        <button
          class="btn btn-warning"
          style="height: 40px; width: 74px;"
          onclick="appendValue('-')"
        >
          -
        </button>
      </div>
      <div class="row1 mb-2">
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('1')"
        >
          1
        </button>
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('2')"
        >
          2
        </button>
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('3')"
        >
          3
        </button>
        <button
          class="btn btn-warning"
          style="height: 40px; width: 74px;"
          onclick="appendValue('+')"
        >
          +
        </button>
      </div>
      <div class="row1 mb-2">
        <button
          class="btn btn-warning"
          style="height: 40px; width: 74px;"
          onclick="toggleSign()"
        >
          +/-
        </button>
        <button
          class="btn btn-primary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('0')"
        >
          0
        </button>
        <button
          class="btn btn-secondary"
          style="height: 40px; width: 74px;"
          onclick="appendValue('.')"
        >
          .
        </button>
        <button
          class="btn btn-success"
          style="height: 40px; width: 74px;"
          onclick="calculate()"
        >
          =
        </button>
      </div>
      <h6 class="mt-2 text-white">@By Senghak</h6>
    </div>
  </body>
</html>
